[tools.read_file]
name = "read_file"
description = "讀取指定路徑的文字檔案內容。僅支援 UTF-8 編碼，二進位檔案可能顯示亂碼。"
hint = "建議先使用 list_dir 檢視目錄結構，再使用 read_file 讀取具體檔案。"
param_path = "檔案路徑，必須是完整路徑"
error_not_found = "錯誤: 檔案不存在"
error_not_file = "錯誤: 不是檔案"

[tools.write_file]
name = "write_file"
description = "將內容寫入檔案，自動建立父目錄。警告：如果檔案已存在，將直接覆蓋！"
hint = "用於建立新檔案或完全重寫已有檔案。如需修改現有檔案的部分內容，請使用 edit_file。"
param_path = "檔案路徑，將自動建立不存在的父目錄"
param_content = "要寫入的檔案內容"

[tools.edit_file]
name = "edit_file"
description = "透過替換文字編輯檔案。old_text 必須精確匹配（包括空格和換行）。如果 old_text 出現多次，會返回警告要求提供更多上下文。"
hint = "建議先用 read_file 檢視檔案內容，確保 old_text 精確匹配後再呼叫。適用於修改檔案的特定部分。"
param_path = "要編輯的檔案路徑"
param_old_text = "要被替換的文字，必須精確匹配（包括空格和換行）"
param_new_text = "用於替換的新文字"

[tools.list_dir]
name = "list_dir"
description = "列出目錄內容，按名稱字母順序排序。📁 表示目錄，📄 表示檔案。"
hint = "使用此工具探索目錄結構後，可使用 read_file 讀取具體檔案內容。"
param_path = "目錄路徑"

[tools.exec]
name = "exec"
description = "執行 shell 命令並返回輸出。預設逾時 60 秒，輸出超過 10000 字元會被截斷。包含安全檢查，禁止危險命令。"
hint = "優先使用檔案系統工具（read_file/write_file/edit_file）處理檔案，僅在需要批次操作、複雜文字處理或系統命令時使用 exec。適用於：批次檔案操作、複雜文字處理、系統資訊查詢、需要管道或重定向的場景。"
param_command = "要執行的 shell 命令"
param_working_dir = "可選的工作目錄，預設為目前目錄"

[tools.web_search]
name = "web_search"
description = "搜尋網際網路取得最新資訊。預設返回 5 條結果，支援 Tavily、Brave Search 和 DuckDuckGo 自動降級。"
hint = "當需要最新資訊、驗證事實、或取得外部資源時使用。搜尋查詢應簡潔明確。如需詳細內容，先用 web_search 取得 URL，再用 web_extract 提取全文。"
param_query = "搜尋查詢，應簡潔明確"
param_max_results = "最大返回結果數，預設 5"

[tools.web_extract]
name = "web_extract"
description = "從網頁 URL 提取內容。支援批次提取（建議一次不超過 5 個 URL）。返回內容超過 5000 字元會被截斷。"
hint = "最佳實踐：先用 web_search 取得相關 URL，再用 web_extract 取得詳細內容。適用於需要閱讀網頁全文內容的場景。"
param_urls = "要提取內容的 URL 列表，支援批次（建議一次不超過 5 個）"
param_extract_depth = "提取深度: basic(快速提取) 或 advanced(深入提取，預設)"

[tools.remember]
name = "remember"
description = "儲存重要資訊到記憶庫，以便後續檢索。記憶是持久化的，跨會話可用。"
hint = "當用戶告訴你重要資訊（如名字、偏好、聯絡方式、日程等）時，必須呼叫此工具。不要只是說'我會記住'，要立即呼叫工具儲存。"
param_content = "要記住的資訊內容，建議簡潔明瞭"
param_category = "分類標籤: personal(個人資訊), preference(偏好), work(工作), contact(聯絡方式), goal(目標), schedule(日程), general(通用)。根據內容類型選擇最合適的分類。"
param_importance = "重要性評分 0.0-1.0，預設 0.5。關鍵資訊（如姓名、重要偏好）用 0.8-1.0，一般資訊用 0.3-0.7，臨時資訊用 0.1-0.3"
success = "資訊已儲存到記憶庫"

[tools.recall]
name = "recall"
description = "從記憶庫中搜索和檢索信息。支持基於查詢類型的混合檢索策略（加權 RRF）。"
hint = "當用戶詢問關於他自己的信息時，必須先調用此工具檢索記憶。根據查詢類型選擇合適的 query_type：factual 用於事實性查詢（如'我的郵箱是多少'），conceptual 用於概念性查詢（如'我喜歡的食物'），complex 用於複雜查詢，ambiguous 用於歧義查詢，keyword_only 用於特定ID或名稱查詢，semantic_only 用於語義探索。"
param_query = "搜索查詢內容"
param_category = "按分類過濾（可選）"
param_top_k = "最大返回數量"
param_query_type = "查詢類型: keyword_only (1.0/0.0), semantic_only (0.0/1.0), factual (0.8/0.2), conceptual (0.2/0.8), complex (0.5/0.5), ambiguous (0.3/0.7)"
param_similarity_threshold = "相似度閾值 (0.0-1.0)，用於過濾語義不相關的結果，默認 0.5。當返回不相關結果時可提高閾值（如 0.7），當返回結果過少時可降低閾值（如 0.3）"
not_found = "未找到匹配的記憶"

[tools.forget]
name = "forget"
description = "從記憶庫中刪除指定的資訊。刪除是永久性的，無法恢復。支援部分匹配，例如輸入'郵箱'會刪除所有包含'郵箱'的記憶。"
hint = "當用戶明確要求忘記、刪除或清除某些資訊時呼叫此工具。刪除後無法恢復，請謹慎使用。"
param_pattern = "要刪除的內容匹配模式，支援部分匹配。例如輸入'郵箱'會刪除所有包含'郵箱'的記憶。"
success = "記憶項目已刪除"

[tools.session_title]
name = "session_title"
description = "取得或設定目前對話的標題。"
hint = "當對話進行 2-3 輪後，若標題為空或需要更新時使用。"
param_action = "操作類型: get(取得標題) 或 set(設定標題)"
param_title = "新標題（僅 set 時需要），5-15 個字元，無標點"
error_no_title = "錯誤: 設定標題時必須提供標題"
error_invalid_action = "錯誤: 無效的操作類型，請使用 get 或 set"
error_too_short = "錯誤: 標題至少需要 5 個字元"
no_session = "未找到目前對話"
current = "目前標題: {title}（{message_count} 條訊息）"
current_none = "目前無標題（對話ID: {session_id}）。{hint}"
get_hint = "對話 2-3 輪後可使用 action=set 產生標題"
set_success = "✅ 標題已設定為: {title}"

