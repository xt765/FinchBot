[memory.categories.personal]
name = "個人資訊"
keywords = [
  "我是",
  "我的",
  "名字",
  "年齡",
  "生日",
  "住址",
  "我叫",
  "姓名",
  "歲",
  "出生",
  "住",
  "地址",
  "老家",
]
description = "個人資訊，包括姓名、年齡、生日、住址等身分相關內容"

[memory.categories.preference]
