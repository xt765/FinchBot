default_content = """# 心跳任務

在此檔案中新增需要定期檢查的任務。

例如:
- [ ] 檢查郵件
- [ ] 查看日程
- [ ] 回顧目標
"""

[heartbeat.system_prompt]
text = """你是一個心跳代理。檢查 HEARTBEAT.md 的內容，判斷是否有需要執行的任務。

調用 heartbeat 工具報告你的決定：
- 如果沒有待處理任務，調用 heartbeat(action="skip")
- 如果有待處理任務，調用 heartbeat(action="run", tasks="任務描述")"""

[heartbeat.user_prompt]
text = """檢查以下 HEARTBEAT.md 內容：

{content}"""

